name: PR Tests

on:
  pull_request:

permissions:
  contents: read

concurrency:
  group: pr-tests-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 25
          cache: npm

      - name: Check package lock
        run: npm run check:package-lock

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      - name: Run tests
        run: npm run test:ci

      - name: Publish job summary
        if: always()
        run: |
          if [ ! -f reports/test-summary.txt ]; then
            echo "Test report was not generated." >&2
            exit 1
          fi
          echo '## Test and coverage report' >> "$GITHUB_STEP_SUMMARY"
          echo '```text' >> "$GITHUB_STEP_SUMMARY"
          cat reports/test-summary.txt >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: |
            reports/test-summary.txt
            reports/junit.xml
          if-no-files-found: error
          retention-days: 14
