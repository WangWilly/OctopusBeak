<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Spending Brush, Pan, and Zoom Prototype</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #15201d;
      --muted: #66736f;
      --line: #dce3df;
      --canvas: #eef2ef;
      --surface: #fff;
      --accent: #167258;
      --invoice: #1d2e29;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * { box-sizing: border-box; }
    body { min-width: 320px; margin: 0; color: var(--ink); background: var(--canvas); }
    button { font: inherit; }
    button:focus-visible, [data-plot]:focus-visible { outline: 3px solid #9bcdbd; outline-offset: 3px; }
    .sr-only { position: absolute; width: 1px; height: 1px; padding: 0; overflow: hidden; clip: rect(0, 0, 0, 0); white-space: nowrap; border: 0; }

    main { width: min(1180px, calc(100% - 32px)); margin: 0 auto; padding: clamp(28px, 6vw, 72px) 0; }
    .eyebrow { margin: 0 0 8px; color: var(--accent); font-size: 12px; font-weight: 800; letter-spacing: .14em; text-transform: uppercase; }
    h1 { max-width: 760px; margin: 0; font-size: clamp(34px, 5vw, 64px); line-height: 1; letter-spacing: -.055em; }
    .lede { max-width: 720px; margin: 18px 0 30px; color: var(--muted); font-size: clamp(15px, 2vw, 18px); line-height: 1.6; }

    [data-prototype] { padding: clamp(16px, 3vw, 32px); border: 1px solid #d4ddd8; border-radius: 24px; background: var(--surface); box-shadow: 0 24px 70px rgba(28, 52, 44, .1); }
    .chart-head { display: flex; align-items: end; justify-content: space-between; gap: 20px; margin-bottom: 22px; }
    .chart-head h2 { margin: 0 0 5px; font-size: clamp(23px, 3vw, 32px); letter-spacing: -.035em; }
    .range { margin: 0; color: var(--muted); font-size: 14px; }
    .mode { flex: 0 0 auto; padding: 7px 11px; color: #135d49; border: 1px solid #b8d9ce; border-radius: 999px; background: #eaf6f2; font-size: 12px; font-weight: 800; }

    .toolbar { display: flex; flex-wrap: wrap; align-items: center; justify-content: space-between; gap: 10px 16px; margin-bottom: 12px; }
    .hint { flex: 1 1 330px; margin: 0; color: var(--muted); font-size: 12px; line-height: 1.45; }
    .controls { display: flex; flex: 0 1 auto; flex-wrap: wrap; gap: 7px; }
    .controls button { min-height: 38px; padding: 8px 11px; color: var(--ink); border: 1px solid var(--line); border-radius: 10px; background: #fff; font-size: 13px; font-weight: 750; cursor: pointer; }
    .controls button:hover:not(:disabled) { color: #fff; border-color: var(--ink); background: var(--ink); }
    .controls button:disabled { opacity: .38; cursor: not-allowed; }

    [data-plot] { position: relative; min-height: 430px; overflow: hidden; border: 1px solid var(--line); border-radius: 16px; background: linear-gradient(to bottom, transparent calc(25% - .5px), #e6ebe8 25%, transparent calc(25% + .5px), transparent calc(50% - .5px), #e6ebe8 50%, transparent calc(50% + .5px), transparent calc(75% - .5px), #e6ebe8 75%, transparent calc(75% + .5px)), #fafcfb; cursor: crosshair; touch-action: none; user-select: none; }
    [data-mode="detail"] [data-plot] { cursor: grab; }
    [data-plot].dragging { cursor: grabbing; }
    .chart { display: flex; align-items: end; gap: clamp(3px, .7vw, 9px); height: 382px; padding: 42px clamp(10px, 2vw, 24px) 0; }
    .overview-bar { position: relative; flex: 1 1 0; min-width: 2px; height: var(--height); border-radius: 4px 4px 1px 1px; background: var(--invoice); }
    .overview-bar::after { content: ""; position: absolute; inset: 0; border-radius: inherit; background: linear-gradient(180deg, rgba(255, 255, 255, .03), rgba(255, 255, 255, .25)); }
    .month-detail { display: grid; flex: 1 1 0; grid-template-rows: 300px auto; gap: 10px; min-width: 0; height: 342px; }
    .pair { display: flex; align-items: end; justify-content: center; gap: clamp(2px, .5vw, 6px); min-width: 0; }
    .stack { display: flex; flex: 0 1 26px; flex-direction: column-reverse; min-width: 5px; max-width: 26px; height: var(--height); overflow: hidden; border-radius: 4px 4px 1px 1px; }
    .segment { flex: 0 0 var(--share); min-height: 1px; background: var(--color); }
    .stack[data-source="account"] { opacity: .62; }
    .month-label { overflow: hidden; color: var(--muted); font-size: 11px; text-align: center; text-overflow: ellipsis; white-space: nowrap; }
    .axis { display: flex; justify-content: space-between; gap: 8px; padding: 0 clamp(10px, 2vw, 24px) 16px; color: var(--muted); font-size: 11px; }
    .legend { display: flex; flex-wrap: wrap; justify-content: center; gap: 8px 14px; padding: 14px 12px; border-top: 1px solid var(--line); color: var(--muted); font-size: 11px; }
    .legend span { display: inline-flex; align-items: center; gap: 5px; }
    .legend i { width: 8px; height: 8px; border-radius: 50%; background: var(--color); }
    .source-key i { border-radius: 2px; background: var(--invoice); }
    .source-key.account i { opacity: .62; }

    [data-brush-overlay] { position: absolute; z-index: 3; top: 0; bottom: 0; left: 0; width: 0; border: 2px solid #12775a; background: rgba(25, 135, 103, .14); pointer-events: none; }
    [data-brush-overlay][hidden] { display: none; }
    [data-tooltip] { position: absolute; z-index: 5; max-width: 210px; padding: 8px 10px; color: #fff; border-radius: 8px; background: #15201d; box-shadow: 0 8px 20px rgba(0, 0, 0, .2); font-size: 11px; line-height: 1.4; pointer-events: none; }
    [data-tooltip][hidden] { display: none; }

    .summary { display: flex; flex-wrap: wrap; justify-content: space-between; gap: 8px 16px; margin-top: 13px; color: var(--muted); font-size: 12px; }
    .summary strong { color: var(--ink); }

    @media (max-width: 560px) {
      main { width: min(100% - 16px, 520px); padding: 18px 0; }
      .lede { margin-bottom: 20px; }
      [data-prototype] { border-radius: 18px; }
      .chart-head { align-items: start; flex-direction: column; gap: 10px; }
      .toolbar { align-items: stretch; }
      .hint { flex-basis: 100%; }
      .controls { display: grid; flex: 1 1 100%; grid-template-columns: repeat(3, minmax(0, 1fr)); }
      .controls button { padding-inline: 5px; font-size: 12px; }
      .controls [data-action="reset"] { grid-column: span 2; }
      [data-plot] { min-height: 370px; }
      .chart { height: 326px; padding-top: 34px; }
      .month-detail { grid-template-rows: 248px auto; height: 286px; }
      .axis span:nth-child(even) { display: none; }
      .legend { gap: 7px 10px; }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { scroll-behavior: auto !important; transition: none !important; }
    }
  </style>
</head>
<body>
  <main>
    <p class="eyebrow">Spending interaction study</p>
    <h1>Explore the whole history, then focus.</h1>
    <p class="lede">Brush a period to reveal category detail. From there, drag to pan, hold Shift to brush again, or zoom around the pointer.</p>

    <section data-prototype="brush-pan-zoom" data-domain-start="0" data-domain-end="29" data-mode="overview">
      <div class="chart-head">
        <div>
          <h2>Monthly spending</h2>
          <p class="range" data-range aria-live="polite"></p>
        </div>
        <span class="mode" data-mode-label></span>
      </div>

      <div class="toolbar">
        <p class="hint" data-hint></p>
        <div class="controls" aria-label="Chart controls">
          <button type="button" data-action="zoom-in">Zoom in</button>
          <button type="button" data-action="zoom-out">Zoom out</button>
          <button type="button" data-action="pan-left">Pan left</button>
          <button type="button" data-action="pan-right">Pan right</button>
          <button type="button" data-action="reset">Reset</button>
        </div>
      </div>

      <div data-plot tabindex="0" aria-label="Interactive monthly spending chart"></div>
      <p class="sr-only" data-visible-summary aria-live="polite"></p>
      <div class="summary" aria-hidden="true"><span data-visible-count></span><strong data-visible-total></strong></div>
    </section>
  </main>

  <script>
    const categoryMeta = [
      ["Dining", "food", "#287bb5"],
      ["Daily essentials", "daily", "#269476"],
      ["Transport", "transport", "#c3862d"],
      ["Shopping", "shopping", "#9368a6"],
      ["Home bills", "home", "#a25b4b"],
      ["Health and leisure", "leisure", "#4d8991"],
      ["Other services", "other", "#5e6e7a"]
    ];

    const months = Array.from({ length: 30 }, (_, index) => {
      const date = new Date(Date.UTC(2024, index + 1, 1));
      const pulse = [0.74, 1.05, 0.88, 1.26, 0.94, 1.48][index % 6];
      const categories = {
        food: Math.round((5600 + (index % 5) * 860) * pulse),
        daily: Math.round((1900 + (index % 4) * 720) * pulse),
        transport: Math.round((500 + (index % 6) * 210) * pulse),
        shopping: Math.round((index % 3 ? 1700 + (index % 5) * 940 : 250) * pulse),
        home: Math.round((index % 4 === 0 ? 4600 : 620) * pulse),
        leisure: Math.round((700 + (index % 7) * 330) * pulse),
        other: Math.round((180 + (index % 5) * 190) * pulse)
      };
      const total = Object.values(categories).reduce((sum, value) => sum + value, 0);
      return {
        label: new Intl.DateTimeFormat("en", { month: "short", year: "2-digit", timeZone: "UTC" }).format(date),
        longLabel: new Intl.DateTimeFormat("en", { month: "long", year: "numeric", timeZone: "UTC" }).format(date),
        total,
        invoice: Math.round(total * (index % 5 === 0 ? .72 : .88)),
        categories
      };
    });

    const prototype = document.querySelector('[data-prototype="brush-pan-zoom"]');
    const plot = prototype.querySelector("[data-plot]");
    const detailThreshold = 10;
    const maxScale = 6;
    const money = value => `TWD ${value.toLocaleString("en")}`;
    let domainStart = 0;
    let domainEnd = months.length - 1;
    let drag = null;

    function setDomain(start, end) {
      const width = Math.max(Math.ceil(months.length / maxScale), Math.min(months.length, end - start + 1));
      const safeStart = Math.max(0, Math.min(months.length - width, Math.round(start)));
      domainStart = safeStart;
      domainEnd = safeStart + width - 1;
      render();
    }

    function reset() {
      setDomain(0, months.length - 1);
    }

    function pan(direction) {
      const width = domainEnd - domainStart + 1;
      const step = Math.max(1, Math.round(width * .2));
      setDomain(domainStart + direction * step, domainEnd + direction * step);
    }

    function zoom(direction, anchor = .5) {
      const width = domainEnd - domainStart + 1;
      const limit = Math.ceil(months.length / maxScale);
      const nextWidth = direction < 0 ? Math.max(limit, Math.floor(width / 1.5)) : Math.min(months.length, Math.ceil(width * 1.5));
      if (nextWidth === width) return;
      const center = domainStart + anchor * (width - 1);
      const nextStart = center - anchor * (nextWidth - 1);
      setDomain(nextStart, nextStart + nextWidth - 1);
    }

    function segmentMarkup(month, source) {
      const amount = source === "invoice" ? month.invoice : month.total - month.invoice;
      return categoryMeta.map(([name, key, color]) => {
        const value = Math.round(month.categories[key] * amount / month.total);
        return `<span class="segment" data-segment style="--share:${month.categories[key] / month.total * 100}%;--color:${color}" aria-label="${month.longLabel}, ${source}, ${name}: ${money(value)}"></span>`;
      }).join("");
    }

    function renderOverview(visible, maxVisible) {
      return `<div class="chart">${visible.map(month => `<div class="overview-bar" data-segment style="--height:${Math.max(5, month.total / maxVisible * 300)}px" aria-label="${month.longLabel}: ${money(month.total)}"></div>`).join("")}</div>`;
    }

    function renderDetail(visible, maxVisible) {
      return `<div class="chart">${visible.map(month => {
        const account = month.total - month.invoice;
        return `<div class="month-detail"><div class="pair"><div class="stack" data-source="invoice" style="--height:${Math.max(4, month.invoice / maxVisible * 290)}px">${segmentMarkup(month, "invoice")}</div><div class="stack" data-source="account" style="--height:${Math.max(4, account / maxVisible * 290)}px">${segmentMarkup(month, "account")}</div></div><span class="month-label">${month.label}</span></div>`;
      }).join("")}</div>`;
    }

    function legendMarkup(detail) {
      if (!detail) return "";
      return `<div class="legend"><span class="source-key"><i></i>Invoice</span><span class="source-key account"><i></i>Account</span>${categoryMeta.map(([name, , color]) => `<span style="--color:${color}"><i></i>${name}</span>`).join("")}</div>`;
    }

    function render() {
      const visible = months.slice(domainStart, domainEnd + 1);
      const detail = visible.length <= detailThreshold;
      const maxVisible = Math.max(...visible.map(month => month.total));
      const total = visible.reduce((sum, month) => sum + month.total, 0);
      const labels = [...new Set([0, Math.floor((visible.length - 1) / 2), visible.length - 1])].map(index => `<span>${visible[index].label}</span>`).join("");

      prototype.dataset.domainStart = String(domainStart);
      prototype.dataset.domainEnd = String(domainEnd);
      prototype.dataset.mode = detail ? "detail" : "overview";
      prototype.querySelector("[data-range]").textContent = `${visible[0].longLabel}–${visible.at(-1).longLabel}`;
      prototype.querySelector("[data-mode-label]").textContent = detail ? "Category detail" : "History overview";
      prototype.querySelector("[data-hint]").textContent = detail ? "Drag to pan · Shift-drag to brush · Command/Ctrl-wheel or double-click to zoom" : "Drag across the chart to brush a detailed period";
      prototype.querySelector("[data-visible-count]").textContent = `${visible.length} visible months`;
      prototype.querySelector("[data-visible-total]").textContent = `${money(total)} visible total`;
      prototype.querySelector("[data-visible-summary]").textContent = `${visible.length} visible months, ${visible[0].longLabel} through ${visible.at(-1).longLabel}, ${money(total)} total. ${detail ? "Paired invoice and account category stacks shown." : "Monthly totals shown."}`;
      prototype.querySelector('[data-action="zoom-in"]').disabled = visible.length <= Math.ceil(months.length / maxScale);
      prototype.querySelector('[data-action="zoom-out"]').disabled = visible.length === months.length;
      prototype.querySelector('[data-action="pan-left"]').disabled = domainStart === 0;
      prototype.querySelector('[data-action="pan-right"]').disabled = domainEnd === months.length - 1;
      prototype.querySelector('[data-action="reset"]').disabled = visible.length === months.length;
      plot.innerHTML = `${detail ? renderDetail(visible, maxVisible) : renderOverview(visible, maxVisible)}<div class="axis">${labels}</div>${legendMarkup(detail)}<div data-brush-overlay hidden></div><div data-tooltip role="tooltip" hidden></div>`;
    }

    function pointerX(event) {
      const box = plot.getBoundingClientRect();
      return Math.max(0, Math.min(box.width, event.clientX - box.left));
    }

    function showTooltip(event) {
      const segment = event.target.closest("[data-segment]");
      const tooltip = plot.querySelector("[data-tooltip]");
      if (!segment || drag) {
        tooltip.hidden = true;
        return;
      }
      tooltip.textContent = segment.getAttribute("aria-label");
      tooltip.hidden = false;
      const box = plot.getBoundingClientRect();
      const left = Math.max(8, Math.min(box.width - tooltip.offsetWidth - 8, event.clientX - box.left + 12));
      const top = Math.max(8, Math.min(box.height - tooltip.offsetHeight - 8, event.clientY - box.top - tooltip.offsetHeight - 12));
      tooltip.style.left = `${left}px`;
      tooltip.style.top = `${top}px`;
    }

    function clearDrag() {
      drag = null;
      plot.classList.remove("dragging");
      const overlay = plot.querySelector("[data-brush-overlay]");
      overlay.hidden = true;
      overlay.style.left = "0";
      overlay.style.width = "0";
    }

    plot.addEventListener("pointerdown", event => {
      if (event.button !== 0) return;
      const brushing = prototype.dataset.mode === "overview" || event.shiftKey;
      drag = { startX: pointerX(event), lastX: pointerX(event), brushing };
      plot.classList.add("dragging");
      plot.setPointerCapture(event.pointerId);
      plot.querySelector("[data-tooltip]").hidden = true;
      if (brushing) plot.querySelector("[data-brush-overlay]").hidden = false;
    });

    plot.addEventListener("pointermove", event => {
      if (!drag) {
        showTooltip(event);
        return;
      }
      drag.lastX = pointerX(event);
      if (drag.brushing) {
        const overlay = plot.querySelector("[data-brush-overlay]");
        overlay.style.left = `${Math.min(drag.startX, drag.lastX)}px`;
        overlay.style.width = `${Math.abs(drag.lastX - drag.startX)}px`;
      }
    });

    plot.addEventListener("pointerleave", () => {
      if (!drag) plot.querySelector("[data-tooltip]").hidden = true;
    });

    plot.addEventListener("pointerup", event => {
      if (!drag) return;
      const box = plot.getBoundingClientRect();
      const width = domainEnd - domainStart + 1;
      const delta = drag.lastX - drag.startX;
      if (drag.brushing && Math.abs(delta) >= 8) {
        const left = Math.min(drag.startX, drag.lastX) / box.width;
        const right = Math.max(drag.startX, drag.lastX) / box.width;
        const start = domainStart + Math.floor(left * width);
        const end = domainStart + Math.ceil(right * width) - 1;
        setDomain(start, end);
      } else if (!drag.brushing && Math.abs(delta) >= 4) {
        const offset = Math.round(delta / box.width * width);
        setDomain(domainStart - offset, domainEnd - offset);
      }
      clearDrag();
    });

    plot.addEventListener("pointercancel", clearDrag);

    plot.addEventListener("wheel", event => {
      const box = plot.getBoundingClientRect();
      if (event.ctrlKey || event.metaKey) {
        event.preventDefault();
        zoom(event.deltaY < 0 ? -1 : 1, Math.max(0, Math.min(1, (event.clientX - box.left) / box.width)));
      } else if (Math.abs(event.deltaX) > 0 || event.shiftKey) {
        event.preventDefault();
        pan((event.deltaX || event.deltaY) > 0 ? 1 : -1);
      }
    }, { passive: false });

    plot.addEventListener("dblclick", event => {
      const box = plot.getBoundingClientRect();
      zoom(-1, Math.max(0, Math.min(1, (event.clientX - box.left) / box.width)));
    });

    prototype.querySelector('[data-action="zoom-in"]').addEventListener("click", () => zoom(-1));
    prototype.querySelector('[data-action="zoom-out"]').addEventListener("click", () => zoom(1));
    prototype.querySelector('[data-action="pan-left"]').addEventListener("click", () => pan(-1));
    prototype.querySelector('[data-action="pan-right"]').addEventListener("click", () => pan(1));
    prototype.querySelector('[data-action="reset"]').addEventListener("click", reset);

    render();
  </script>
</body>
</html>
